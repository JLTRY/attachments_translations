ATTACH_HELP_180100_TEXT="Toto rozšíření poskytuje možnosti překladu a podporuje následující jazyky (kromě angličtiny). Upozorňujeme, že některé jazykové balíčky jsou aktualizovány pro verzi 'Attachments' 3.0 a nemusí být dostupné."
