; Czech translation

ATTACH_HELP_000000_MAIN_TITLE="Dokumentace příloh"
ATTACH_HELP_000100_MAIN_VERSION="Tato verze je kompatibilní s Joomla 4+ nebo 5.x"
ATTACH_HELP_000200_MAIN_CONTENTS="Obsah"
ATTACH_HELP_010000_SECTION_TITLE="Úvod"
ATTACH_HELP_010100_TEXT="Rozšíření 'Attachments' pro Joomla! umožňuje nahrávat soubory a připojovat je k článkům, kategoriím nebo jiným typům obsahových položek. Rozšíření 'Attachments' zahrnuje plugin pro zobrazení příloh a komponentu pro nahrávání a správu příloh, stejně jako další pluginy. K dispozici jsou možnosti pro řízení, kdo může přílohy vidět a kdo je může nahrávat, spolu s mnoha možnostmi pro zvýšení jeho flexibility a užitečnosti. Poznámka: všechny možnosti jsou řízeny prostřednictvím správce komponenty."
ATTACH_HELP_010200_WARNING="Tato verze rozšíření <em>Attachments</em> funguje pouze pro Joomla! 4.0.0 nebo vyšší. Joomla 3.x již není podporována."
ATTACH_HELP_010300_NOTE="Ve zbytku tohoto dokumentu je někdy používán termín <strong>obsahová položka</strong>. Obvykle uvažujeme o připojování souborů k článkům. Attachments standardně podporuje připojování souborů a URL k článkům nebo popisům kategorií. Je však možné připojovat i jiné typy obsahu (to vyžaduje speciální pluginy 'Attachments'). Všechny tyto jsou označovány jako <strong>obsahové položky.</strong>."
ATTACH_HELP_010400_TEXT="Rozšíření 'Attachments' bylo přeloženo do mnoha různých jazyků. Viz prosím sekci {SECT_TRANS} pro seznam dostupných překladů."
ATTACH_HELP_010500_TEXT="Pokud se chcete přihlásit k odběru e-mailového seznamu pro oznámení o tomto rozšíření, přihlaste se prosím pomocí této webové stránky:"
ATTACH_HELP_010600_TEXT="E-mailový seznam Attachments (%s)"
ATTACH_HELP_020000_SECTION_TITLE="Hlavní nové funkce v Attachments 4.1.x"
ATTACH_HELP_020050_TEXT="Attachments 4.1.3 : Přidání funkce FontAwesome - alternativa pro staré gif ikony."
ATTACH_HELP_020100_TEXT="Attachments 4.1.0 nyní běží na Joomla 4.0 a vyšší."
ATTACH_HELP_020200_TEXT="Attachments 4.1.0 přidává nové tlačítko pro {attachments id=xxx } pro možnost vybrat, kterou přílohu zobrazit."
ATTACH_HELP_020300_TEXT="Attachments 4.1.0 skrývá prázdné závorky při zobrazení příloh bez popisu"
ATTACH_HELP_020400_TEXT="Attachments 4.1.0 přidává možnost zobrazit přílohy v popup okně."
ATTACH_HELP_020500_TEXT="Attachments 4.1.0 přidává plugin pro použití pokročilého vyhledávání s přílohami."
ATTACH_HELP_030000_SECTION_TITLE="Hlavní funkce rozšíření Attachments"
ATTACH_HELP_030100_TEXT="Plná podpora systému ACL/oprávnění Joomla 4.0+. To vám poskytuje významnou flexibilitu pro řízení, kdo může vytvářet, upravovat nebo mazat přílohy. Viz sekci {SECT_PERMS} pro více detailů."
ATTACH_HELP_030200_TEXT="Plná podpora úrovní přístupu pro zobrazení. To znamená, že můžete některé přílohy nastavit jako viditelné pro kohokoliv a některé pouze pro uživatele v určitých skupinách (jak je definováno úrovněmi přístupu). Viz sekci {SECT_ACCESS} pro více detailů."
ATTACH_HELP_030300_TEXT="Přílohy můžete spravovat z editoru článků, včetně přidávání, úprav a mazání příloh."
ATTACH_HELP_030400_TEXT="Přílohy můžete vytvářet během vytváření článku."
ATTACH_HELP_030500_TEXT="Všechny seznamy příloh na frontendu jsou aktualizovány pomocí Ajaxu a nevyžadují úplné znovunačtení stránky."
ATTACH_HELP_030600_TEXT="Můžete „připojovat“ URL stejně jako soubory k obsahovým položkám."
ATTACH_HELP_030700_TEXT="Seznam příloh můžete zobrazit kdekoliv v článku (nebo obsahové položce)."
ATTACH_HELP_030800_TEXT="V administrátorském backendu:"
ATTACH_HELP_030900_TEXT="K dispozici jsou možnosti filtrování zobrazených příloh podle nepublikovaných nebo košem označených článků či obsahových položek."
ATTACH_HELP_031000_TEXT="Filtrování seznamu článků"
ATTACH_HELP_031100_TEXT="Řazení seznamu příloh podle libovolného záhlaví sloupce."
ATTACH_HELP_031200_TEXT="Užitečné administrativní nástroje"
ATTACH_HELP_031300_TEXT="Rozšíření Attachments podporuje „Attachments pluginy“. Tyto pluginy umožňují připojování souborů k jakékoli obsahové položce, která vyvolává plugin {ONCONTENTPREPARE}. Například můžete připojovat soubory k popisům kategorií. S trochou práce může vývojář rozšíření vytvořit nový plugin 'Attachments' pro podporu přidávání příloh k věcem jako jsou osobní informace CB, popisy produktů Virtuemart atd. Viz sekci {SECT_FILES} pro více detailů."
ATTACH_HELP_040000_SECTION_TITLE="Omezení nahrávání"
ATTACH_HELP_040100_TEXT="Ne všechny typy souborů příloh lze nahrát. Rozšíření 'Attachments' neumožní nahrávání typů souborů, které nejsou povoleny správcem médií Joomla!. Pro zobrazení (nebo změnu), které typy souborů jsou povoleny, přejděte na položku <strong>Správce médií</strong> v menu <strong>Obsah</strong>. Klikněte na tlačítko <strong>Možnosti</strong> na pravém konci panelu nástrojů a vyberte záložku <em>Komponenta</em>. Zde uvidíte možnosti pro řízení, které přípony souborů a MIME typy jsou povoleny pro nahrávání. Rozšíření 'Attachments' respektuje omezení typů souborů v poli 'Povolené přípony (typy souborů)'. Přidejte přípony pro jakýkoli typ souboru, který potřebujete, do pole 'Povolené přípony (typy souborů)'. Můžete také přidat odpovídající MIME typy do pole 'Povolené MIME typy'. Všimněte si, že limit velikosti souboru ve správci médií je rozšířením Attachments ignorován (stejně jako ostatní možnosti na této stránce)."
ATTACH_HELP_040200_WARNING="Pokud přidáváte položky do polí "Povolené přípony" nebo "Povolené MIME typy", nepřidávejte mezi položky žádné mezery!"
ATTACH_HELP_050000_SECTION_TITLE="Nastavení Attachments"
ATTACH_HELP_050100_TEXT="Všechna nastavení pro 'Attachments' jsou řízena prostřednictvím správce komponenty. Pro přístup k těmto nastavením přejděte do administrátorského backendu a vyberte "Attachments" v menu "Komponenta". Klikněte na tlačítko "Možnosti" na pravém konci panelu nástrojů a zobrazí se možnosti seskupené do několika záložek."
ATTACH_HELP_050200_SUBSECTION_TITLE="Základní možnosti"
ATTACH_HELP_050300_TEXT="Tato funkce 'automatického publikování' řídí, zda jsou nové přílohy po přidání automaticky publikovány. Pokud je vybráno 'Ano', přílohy budou ihned publikovány a budou viditelné pro uživatele. Pokud je vybráno 'Ne', nové přílohy nebudou automaticky publikovány. Administrátor nebo uživatel s odpovídajícími oprávněními je musí publikovat, aby byly dostupné pro uživatele."
ATTACH_HELP_050400_TEXT="Pokud je možnost automatického publikování zakázána (viz předchozí možnost), můžete chtít informovat uživatele přidávající přílohy, jak mohou zajistit publikování své přílohy. Zde můžete vložit odpovídající zprávu. Pokud je toto pole prázdné, bude přidána obecná systémová zpráva doporučující kontaktovat správce systému pro publikování nově nahraných příloh."
ATTACH_HELP_050600_TEXT="Název pro uživatelské pole 1-3"
ATTACH_HELP_050700_HINT_TEXT="Pokud přidáte hvězdičku na konec názvu uživatelského pole, nebude se zobrazovat na frontendu. Bude viditelné při úpravě přílohy na frontendu a vždy viditelné v backendu. Toto skryté uživatelské pole lze použít pro řazení příloh v libovolném pořadí zadáním odpovídajících celočíselných hodnot do pole."
ATTACH_HELP_050900_TEXT="Tato možnost řídí umístění v článku (nebo obsahové položce), kde bude seznam příloh umístěn. Tato možnost se vztahuje na všechny seznamy příloh:"
ATTACH_HELP_051000_TEXT="<em>Na začátku</em>"
ATTACH_HELP_051100_TEXT="<em>Na konci</em>"
ATTACH_HELP_051200_TEXT="<em>Vlastní umístění</em>' - S touto možností se seznam příloh zobrazí v článku (nebo obsahové položce) tam, kde se vyskytuje speciální tag: {attachments}."
ATTACH_HELP_051300_WARNING="V režimu vlastního umístění bude u každého článku (nebo obsahové položky), který tento tag neobsahuje, seznam příloh zobrazen na jeho konci."
ATTACH_HELP_051400_TEXT="V tomto režimu se při úpravě článku v backendu zobrazí pod editační oblastí extra tlačítko: [Vložit token {attachments}]. Umístěte kurzor na místo, kam chcete vložit token vlastního umístění, a použijte toto tlačítko pro vložení tokenu. Toto tlačítko přidá okolní HTML tagy pro skrytí tokenu, pokud není nahrazen (například když se seznam příloh nemá zobrazit). V HTML vypadá token takto s okolními tagy pro jeho skrytí:"
ATTACH_HELP_051500_TEXT="V backend editorech uvidíte tag {attachments}, ale HTML tagy 'span' neuvidíte, pokud nepřepnete do HTML režimu. Na frontendu nikdy neuvidíte tag {attachments}, pokud není plugin insert_attachments_tag deaktivován. Pokud chcete token {attachments} odstranit, doporučuje se použít režim zobrazení "HTML" v editoru, abyste se ujistili, že odstraníte i okolní span tagy."
ATTACH_HELP_051700_TEXT="'<em>Zakázáno (filtr)</em>' - Tato možnost zakáže zobrazení seznamů příloh a potlačí zobrazení všech tagů {attachments} v článcích nebo obsahových položkách."
ATTACH_HELP_051800_TEXT="'<em>Zakázáno (bez filtru)</em>' - Tato možnost zakáže zobrazení seznamů příloh a nepotlačí zobrazení žádných tagů {attachments} v článcích (nebo obsahových položkách)."
ATTACH_HELP_052000_SUBSECTION_TITLE="Možnosti formátování"
ATTACH_HELP_052600_WARNING="Tato možnost funguje pouze pro souborové přílohy v zabezpečeném režimu! V nezabezpečeném režimu jsou soubory udržovány jako statické soubory a jsou přístupné přímo bez průchodu kódem Joomla!. Proto není možné aktualizovat počet stažení souboru při tomto způsobu přístupu. Zobrazení počtu stažení souborů nebo URL tedy funguje pouze v zabezpečeném režimu, pokud je tato možnost nastavena na 'Ano'."
ATTACH_HELP_052650_TEXT="Pokud je toto nastavení 'Ano', datum vytvoření přílohy bude přidáno do seznamu příloh u článků, které mají přílohy. Pokud je vybráno 'Ne', žádné datum nebude do seznamu příloh přidáno."
ATTACH_HELP_052700_TEXT="Pokud je toto nastavení 'Ano', datum úpravy přílohy bude přidáno do seznamu příloh u článků, které mají přílohy. Pokud je vybráno 'Ne', žádné datum nebude do seznamu příloh přidáno."
ATTACH_HELP_052900_TEXT="Tato možnost vám umožňuje určit pořadí, v jakém budou přílohy zobrazeny v seznamech příloh. Většina možností je samozřejmá:"
ATTACH_HELP_053000_TEXT="'<em>{LABEL}</em>' - Pokud je tato možnost vybrána, přílohy budou řazeny abecedně podle názvu souboru. "
ATTACH_HELP_053100_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053200_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053300_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053400_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053500_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053600_TEXT="'<em>{LABEL}</em>' - Řadí přílohy podle názvů souborů nebo URL. Všechny přílohy, které mají prázdné zobrazované názvy souborů/URL, se zobrazí před těmi, které mají zobrazované názvy. "
ATTACH_HELP_053700_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053800_TEXT="'<em>{LABEL}</em>' - Řazení podle jména uživatele, který přílohu nahrál."
ATTACH_HELP_053900_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054000_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054100_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054200_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054300_TEXT="'<em>{LABEL}</em>' - Pokud je tato možnost vybrána, přílohy budou řazeny podle ID přílohy. To obvykle znamená řazení příloh v pořadí, v jakém byly vytvořeny. "
ATTACH_HELP_054400_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054500_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054600_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_055000_SUBSECTION_TITLE="Možnosti viditelnosti"
ATTACH_HELP_055100_TEXT="Tyto možnosti určují, kdy budou přílohy viditelné na hlavní stránce, za předpokladu, že uživatel patří do odpovídajících skupin pro jejich zobrazení."
ATTACH_HELP_055800_TEXT="{DESCRIPTION} URL pro přihlášení nebo registraci lze nastavit v záložce 'Pokročilé'."
ATTACH_HELP_055900_TEXT="<strong>Skrýt odkaz 'Přidat přílohy':</strong> Vždy skrýt odkaz 'Přidat přílohy' na hlavní stránce. To vyžaduje přidávání příloh k článkům atd. jejich úpravou na hlavní stránce (kde bude pod editační oblastí dostupné tlačítko 'Přidat přílohy')."
ATTACH_HELP_057000_SUBSECTION_TITLE="Pokročilé možnosti"
ATTACH_HELP_057050_TEXT="{DESCRIPTION}. Pro informace o zvýšení limitu velikosti nahrávání na vašem serveru viz sekci {SECT_WARN}."
ATTACH_HELP_057200_TEXT="{DESCRIPTION}. Pro více informací o přizpůsobení zobrazení seznamů příloh viz sekci {SECT_STYLE}."
ATTACH_HELP_057400_TEXT="{DESCRIPTION} Všimněte si, že položka bez číselného ID na začátku bude použita pro všechny obsahové položky. Proto je dobrá praxe umístit takové globální přepisy na začátek seznamu a poté přepisovat názvy pro jednotlivé položky."
ATTACH_HELP_057500_NOTE="Pokud chcete globálně změnit názvy používané pro seznamy příloh, můžete zkopírovat položku překladu 'ATTACH_ATTACHMENTS_TITLE' ze souboru překladu: {BLOCK1} do souboru globálních přepisů: {BLOCK2}"
ATTACH_HELP_057600_NOTE="kde qq-QQ označuje kód jazyka, například en-GB pro angličtinu. (Pokud nejste obeznámeni se soubory překladu Joomla!, najděte řádek, který má na levé straně znaku '=' 'ATTACH_ATTACHMENTS_TITLE' a překlad na pravé straně v uvozovkách. Upravte pouze text na pravé straně znaku '='. Neměňte nic na levé straně znaku '='.). Důvod, proč umístit úpravy překladu do souboru globálních přepisů, je ten, že první výše uvedený soubor překladu je součástí rozšíření Attachments a bude aktualizován při jeho aktualizaci (což znamená, že jakékoli změny, které v něm provedete, budou ztraceny)."
ATTACH_HELP_057900_TEXT="{DESCRIPTION} Když použijete rozbalovací menu pro řízení, které přílohy jsou viditelné, systém si toto nastavení pamatuje, dokud se neodhlásíte jako administrátor. Proto se může zdát, že změna tohoto parametru nemá žádný efekt. Toto nastavení se projeví při dalším přihlášení jako administrátor."
ATTACH_HELP_058000_SUBSECTION_TITLE="Možnosti zabezpečení"
ATTACH_HELP_058100_TEXT="Ve výchozím nastavení ukládá rozšíření 'Attachments' soubory příloh do veřejně přístupného podadresáře. Pokud zvolíte možnost <em>zabezpečené</em>, adresář, ve kterém jsou přílohy uloženy, bude veřejně nepřístupný. Odkazy ke stažení příloh na frontendu budou stahovat soubory příloh, ale nebudou přímými odkazy. To zabrání přístupu, pokud uživatelé nemají odpovídající oprávnění. Pokud nejsou <em>zabezpečené</em> stahování zvoleny, odkazy na přílohy budou zobrazeny podle výše uvedených možností, ale soubory budou stále přístupné komukoli, kdo zná úplnou URL (i když není přihlášen), protože podadresář je veřejný."
ATTACH_HELP_058200_TEXT="Možnost <em>zabezpečené</em> zabraňuje přístupu k nahraným souborům uživatelům bez odpovídajících oprávnění, i když znají úplnou URL, protože tato možnost zakazuje veřejný přístup k podadresáři příloh. U URL 'attachments' se zobrazuje 'zobrazovaný název' URL, nikoli plná URL. Když se uživatel s odpovídajícími oprávněními pokusí přistoupit k URL příloze, bude přesměrován na požadovanou URL. Proto pro URL 'attachments' musí být nastaven zobrazovaný název, pokud nemá být skutečná URL odhalena."
ATTACH_HELP_058300_TEXT="V režimu <em>zabezpečené</em> může každou přílohu nastavenou na úroveň přístupu 'Public' vidět a stáhnout kdokoli."
ATTACH_HELP_058400_HINT="Pokud máte problémy s názvy souborů obsahujícími znaky Unicode, měli byste povolit možnost <strong>Zabezpečené stahování příloh</strong> (zejména na serverech Windows)."
ATTACH_HELP_058500_TEXT="Tato možnost určuje, zda mají být soubory stahovány jako samostatné soubory nebo zobrazeny v prohlížeči (pokud prohlížeč daný typ souboru podporuje). Jsou dvě možnosti:"
ATTACH_HELP_058600_TEXT="<em>'inline'</em> - V tomto režimu budou soubory, které lze zobrazit v prohlížeči, zobrazeny v prohlížeči (například textové soubory a obrázky)."
ATTACH_HELP_058700_TEXT="<em>'attachment'</em> - V režimu 'attachment' budou soubory vždy stahovány jako samostatné soubory."
ATTACH_HELP_058800_TEXT="V obou případech budou soubory, které nelze zobrazit v prohlížeči, staženy jako externí soubory."
ATTACH_HELP_059000_SUBSECTION_TITLE="Možnosti oprávnění"
ATTACH_HELP_059100_TEXT="Možnosti oprávnění jsou vysvětleny v následující sekci {SECT_PERMS} (dále)."
ATTACH_HELP_060000_SECTION_TITLE="Oprávnění Attachments"
ATTACH_HELP_060100_TEXT="Rozšíření Attachments plně využívá nový systém ACL/oprávnění Joomla!, zavedený v Joomla! 1.6. To dává webům používajícím Attachments velkou flexibilitu při řízení, kdo může vytvářet, upravovat, mazat a spravovat přílohy."
ATTACH_HELP_060200_TEXT="Před popisem ACL oprávnění souvisejících s Attachments je důležité pochopit jeden klíčový princip:"
ATTACH_HELP_060300_IMPORTANT="Všechny přílohy jsou připojeny k nadřazenému článku, kategorii nebo jiné obsahové položce. Vytváření, úprava, mazání nebo změna stavu přílohy je považována za formu úpravy nadřazené obsahové položky. Uživatel tedy musí mít nejprve oprávnění upravovat nadřazenou obsahovou položku, než budou kontrolována oprávnění specifická pro Attachments."
ATTACH_HELP_060400_TEXT="Pro změnu oprávnění pro různé uživatelské skupiny přejděte do administrátorského backendu a vyberte "Attachments" v menu "Komponenta". Klikněte na tlačítko "Možnosti" na pravém konci panelu nástrojů a poté vyberte záložku oprávnění. Uvidíte něco jako toto:"
ATTACH_HELP_060500_TEXT="Možnosti oprávnění"
ATTACH_HELP_060600_TEXT="Možnosti oprávnění příloh. Jsou zobrazeny oprávnění pro skupinu Public."
ATTACH_HELP_060700_TEXT="Zde je stručný popis oprávnění souvisejících s Attachments, která jsou k dispozici:"
ATTACH_HELP_060800_TEXT="Oprávnění"
ATTACH_HELP_060900_TEXT="Popis / Poznámky"
ATTACH_HELP_061000_TEXT="ACL akce"
ATTACH_HELP_062000_SUBSECTION_TITLE="Výchozí oprávnění"
ATTACH_HELP_062100_TEXT="Při instalaci rozšíření Attachments se nastaví tato základní oprávnění:"
ATTACH_HELP_062200_IMPORTANT="<strong>Základní chování výchozích oprávnění</strong>"
ATTACH_HELP_062300_TEXT="Autoři (a manažeři) nebo vyšší mohou přidávat přílohy ke všem článkům/nadřazeným položkám, které mohou upravovat"
ATTACH_HELP_062400_TEXT="Autoři (a manažeři) nebo vyšší mohou upravovat nebo mazat jakékoli přílohy u všech článků/nadřazených položek, které mohou upravovat"
ATTACH_HELP_062500_TEXT="Editoři (a manažeři) nebo vyšší mohou publikovat/odpublikovat přílohy z frontendu."
ATTACH_HELP_062600_TEXT="Autoři nemohou publikovat své vlastní přílohy."
ATTACH_HELP_062700_TEXT="Pokud chcete jiné výchozí nastavení, budete muset upravit oprávnění pomocí záložky "Oprávnění" v možnostech Attachments."
ATTACH_HELP_063000_SUBSECTION_TITLE="Nastavení oprávnění pro běžné scénáře"
ATTACH_HELP_063100_TEXT="Zde jsou některé návrhy, jak nastavit oprávnění pro dosažení požadovaného chování:"
ATTACH_HELP_063200_TEXT="<strong>Scénář 1 - Autoři mohou publikovat své vlastní přílohy</strong>"
ATTACH_HELP_063300_TEXT="V možnostech oprávnění klikněte na položku 'Author'. Najděte řádek 'Edit State of Own Attachments' a nastavte jej na 'Allowed' a klikněte na 'Save' pro potvrzení změn."
ATTACH_HELP_063400_TEXT="Nastavení oprávnění pro scénář1"
ATTACH_HELP_063500_TEXT="<strong>Scénář 2 - Autoři mohou upravovat/mazat své vlastní přílohy, ale žádné cizí</strong>"
ATTACH_HELP_063600_TEXT="V možnostech oprávnění klikněte na položku 'Author'. Najděte 'Edit State Of Attachments For Owned Article/Parent' a 'Delete Attachments For Owned Article/Parent' a nastavte obě na 'Denied'. Klikněte na 'Save' pro potvrzení změn."
ATTACH_HELP_063700_TEXT="Nastavení oprávnění pro scénář2"
ATTACH_HELP_063800_TEXT="Protože autor má stále oprávnění upravovat/mazat své vlastní přílohy, toto efektivně zabrání upravovat/mazat přílohy, které nevytvořil, i když může upravovat článek."
ATTACH_HELP_063900_TEXT="Všimněte si, že všechny uživatelské skupiny odvozené od Author (např. Editor, Publisher atd.) budou také mít zakázáno upravovat nebo mazat přílohy pro články/nadřazené položky, které nevytvořily (z tohoto oprávnění). Naštěstí obvykle mají vyšší oprávnění 'Edit Attachments' a 'Delete Attachments', což znamená, že mohou upravovat nebo mazat jakékoli přílohy u jakéhokoli článku, který mohou upravovat (za předpokladu, že jejich oprávnění nebyla změněna)."
ATTACH_HELP_064000_TEXT="Pokud máte další běžné scénáře, které by měly být zdokumentovány, neváhejte mě kontaktovat, abych mohl tuto dokumentaci aktualizovat (viz konec této stránky pro kontaktní informace)."
ATTACH_HELP_065000_SUBSECTION_TITLE="Další poznámky k oprávněním"
ATTACH_HELP_065100_TEXT="Pokud má uživatel oprávnění upravovat stav svých příloh, uvidí ve formulářích pro přidání nebo úpravu příloh volby 'Publikováno: Ano/Ne'. Pokud zvolí 'Ne' a uloží přílohu, příloha bude stále viditelná pro něj na frontendu (pokud je přihlášen), ale řádek této přílohy bude tmavě šedý jako indikace, že příloha není veřejná. Nikdo jiný neuvidí nepublikované přílohy na frontendu. Pokud chce uživatel změnit stav publikování, může přílohu upravit (i když je zašedlá) a změnit její stav."
ATTACH_HELP_070000_SECTION_TITLE="Řízení viditelnosti pomocí úrovní přístupu"
ATTACH_HELP_070100_TEXT="Rozšíření Attachments nyní podporuje Joomla 'Access Levels'. Každé příloze lze přiřadit konkrétní úroveň přístupu, jako je 'Public', 'Registered' a 'Special', stejně jako jakékoli další úrovně přístupu vytvořené na vašem webu. Dvě základní úrovně jsou:"
ATTACH_HELP_070200_TEXT="<strong>'Public'</strong> - Každý návštěvník webu bude moci vidět a stahovat přílohy s nastavenou úrovní přístupu 'Public', pokud je článek/nadřazená položka viditelná a žádná další nastavení viditelnosti Attachments tomu nebrání."
ATTACH_HELP_070300_TEXT="<strong>'Registered'</strong> - Každý přihlášený uživatel bude moci vidět a stahovat přílohy s nastavenou úrovní přístupu 'Registered', pokud je článek/nadřazená položka viditelná a žádná další nastavení viditelnosti Attachments tomu nebrání."
ATTACH_HELP_070400_TEXT="Účinek ostatních úrovní přístupu závisí na skupinách přiřazených k dané úrovni."
ATTACH_HELP_070500_TEXT="Možnost nastavit úroveň přístupu pro jednotlivé přílohy poskytuje rozsáhlou kontrolu nad tím, kdo může přílohy vidět a stahovat."
ATTACH_HELP_070600_NOTE="Předpokládejme, že na vašem webu vytvoříte novou úroveň přístupu. Uživatelé, kteří nejsou výslovně členy skupin přiřazených k této nové úrovni, nebudou moci nastavit své přílohy na tuto úroveň přístupu. Pokud upravujete přílohu jako Super User, můžete být překvapeni, že se nová úroveň přístupu nezobrazuje v možnostech. Pokud jste novou úroveň právě vytvořili, může být nutné se odhlásit z backendu a znovu přihlásit, aby se změny plně projevily (kvůli cache)."
ATTACH_HELP_080000_SECTION_TITLE="Zobrazovaný název souboru nebo URL"
ATTACH_HELP_080100_TEXT="Obvykle se při nahrání souborů (nebo zadání URL) a jejich zobrazení v seznamu příloh zobrazuje celý název souboru (nebo URL) jako odkaz ke stažení. V některých případech může být název souboru (nebo URL) příliš dlouhý. Ve formuláři pro nahrání existuje další pole nazvané "Zobrazovaný název souboru nebo URL", do kterého může uživatel zadat alternativní název (nebo URL) nebo popisek, který se zobrazí místo plného názvu. Například lze zadat zkrácenou verzi názvu souboru. Toto pole lze upravit v administrátorském backendu při úpravě příloh. Poznámka: Existuje možnost "Maximální délka názvu souboru nebo URL" v nastavení rozšíření 'Attachments'. Lze ji nastavit tak, aby automaticky zkracovala zobrazované názvy; výsledný zkrácený název bude vložen do pole "Zobrazovaný název souboru nebo URL"."
ATTACH_HELP_090000_SECTION_TITLE="Připojování URL"
ATTACH_HELP_090100_TEXT="Kromě souborů má rozšíření 'Attachments' také možnost „připojovat“ URL k obsahovým položkám. Když otevřete dialogové okno „Přidat přílohu“, uvidíte tlačítko označené „Zadat URL místo toho“. Pokud na něj kliknete, zobrazí se pole pro zadání URL a dvě možnosti:"
ATTACH_HELP_090200_TEXT="<strong>Ověřit existenci URL?</strong> - Pro určení typu souboru URL (pro výběr vhodné ikony) kód dotazuje server na základní informace o souboru, včetně typu a velikosti. V některých případech server na tyto požadavky neodpoví, i když je URL platná. Ve výchozím nastavení Attachments nepřijme URL, které nebyly serverem ověřeny. Pokud ale víte, že URL je platná, můžete tuto volbu zrušit a vynutit přijetí URL rozšířením 'Attachments'—ale není zaručeno, že typ nebo velikost souboru budou správné. Všimněte si, že server bude dotazován bez ohledu na tuto volbu."
ATTACH_HELP_090300_TEXT="<strong>Relativní URL?</strong> - Obvykle zadáváte URL začínající na 'http...' pro označení úplné webové adresy. Pokud chcete odkazovat na soubory/příkazy relativně k vaší instalaci Joomla, použijte možnost 'relativní'. V tomto případě byste měli nastavit 'Ověřit existenci URL' na Ne."
ATTACH_HELP_090400_TEXT="URL jsou zobrazeny s ikonou typu souboru a překryty šipkou (označující platný odkaz) nebo červeným diagonálním pruhem (označující, že nebylo možné ověřit). Při úpravě URL můžete změnit, zda je odkaz platný či nikoli, a tím ovlivnit zobrazený překryv. Také si všimněte, že překryvy URL lze zcela zakázat pomocí hlavního parametru <strong>Superimpose URL link icons</strong>. V backendu jsou v příkazu „Utilities“ k dispozici různé užitečné nástroje týkající se URL (a souborů)."
ATTACH_HELP_100000_SECTION_TITLE="K čemu lze soubory připojit?"
ATTACH_HELP_100100_TEXT="Kromě připojování souborů nebo URL k článkům je možné připojovat soubory nebo URL i k jiným typům obsahových položek, jako jsou popisy kategorií (viz níže). Pokud jsou nainstalovány příslušné pluginy 'Attachments', může být možné připojovat soubory nebo URL k široké škále obsahových položek, jako jsou uživatelské profily, popisy produktů v nákupním košíku atd. V podstatě jakákoli obsahová položka, která je zobrazena na frontendu a používá událost obsahu {ONCONTENTPREPARE}, může obsahovat přílohy (pokud je nainstalován vhodný plugin 'Attachments'). Obsahové položky, které vyvolávají události obsahu, jsou typicky položky, které mají obsah k zobrazení (například články) nebo mají popisy, které budou zobrazeny."
ATTACH_HELP_100200_WARNING="Přílohy pro kategorie se zobrazí pouze tehdy, pokud je základní parametr kategorie 'description' nastaven na <em>Zobrazit</em> (v editoru menu) A popis kategorie není prázdný."
ATTACH_HELP_100300_TEXT="Pokud se chcete dozvědět více o tom, jak vytvořit nový plugin Attachments, je k dispozici manuál na webu Attachments:"
ATTACH_HELP_100400_TEXT="Web Attachments ([https://jmcameron.net/attachments](https://jmcameron.net/attachments))"
ATTACH_HELP_100500_WARNING="Manuál pro tvorbu pluginů Attachments byl aktualizován pro Joomla 2.5 a 3.x, ale nebyl důkladně testován ani revidován. Prosím pošlete mi e-mailem návrhy, jak manuál vylepšit!"
ATTACH_HELP_110000_SECTION_TITLE="CSS stylování seznamů příloh"
ATTACH_HELP_110100_TEXT="Seznamy příloh na frontendu jsou vytvářeny pomocí speciálního 'div', který obsahuje tabulku příloh. Tabulka má přiřazeno několik různých CSS tříd, aby měl vývojář webu flexibilitu při přizpůsobení vzhledu tabulky. Podívejte se do CSS souboru pluginu attachments (v <strong>media/com_attachments/css/attachments_list.css</strong>) pro příklady. Pokud chcete změnit styl, zvažte zkopírování původních stylů na konec stejného souboru a přejmenování 'attachmentsList' ve zkopírované sekci na vámi zvolený název. Upravte parametr 'Attachments' (ve správci komponenty) a změňte parametr <em>attachments table style</em> na nový název třídy. Poté upravte definice tříd ve vaší zkopírované sekci. Tento přístup vám umožní rychle se vrátit k původnímu stylu změnou parametru pluginu <em>attachments table style</em> zpět na výchozí hodnotu 'attachmentsList'. Má také výhodu, že sekci upravených stylů lze zkopírovat do souboru a snadno ji znovu použít při aktualizaci verze 'Attachments'. To lze také provést pomocí CSS příkazu @import. Upozorňujeme, že tyto změny budou ztraceny při další aktualizaci Attachments."
ATTACH_HELP_110200_TEXT="<strong>Změna CSS stylování pomocí přepisů šablony:</strong> Lepší způsob, jak změnit CSS stylování, je použít přepisy šablony. Zkopírujte CSS soubor, který chcete upravit, do oblasti CSS přepisů šablony. Například pro formátování základního seznamu příloh zkopírujte:"
ATTACH_HELP_110300_TEXT="kde 'TEMPLATE' by mělo být nahrazeno názvem adresáře vaší šablony. Poté můžete upravit zkopírovaný CSS soubor dle potřeby. Výhodou tohoto přístupu je, že při aktualizaci rozšíření Attachments nepřijdete o změny v tomto souboru (protože není spravován rozšířením Attachments). Touto technikou můžete přepsat libovolný CSS soubor."
ATTACH_HELP_120000_SECTION_TITLE="Ikony typů souborů"
ATTACH_HELP_120100_TEXT="Rozšíření 'Attachments' přidává ikonu před každou přílohu v seznamu příloh. Pokud chcete přidat nový typ ikony, postupujte takto:"
ATTACH_HELP_120200_TEXT="Přidejte odpovídající ikonu do adresáře 'media/com_attachments/images/file_icons/', pokud tam již není."
ATTACH_HELP_120300_TEXT="Upravte soubor 'components/com_attachments/file_types.php' a přidejte odpovídající řádek do statického pole <strong>attachments_icon_from_file_extension</strong>, které mapuje příponu souboru na název ikony (vše v adresáři 'media/com_attachments/images/file_icons/'). Pokud to nefunguje, může být nutné přidat odpovídající řádek do pole 'attachments_icon_from_mime_type'."
ATTACH_HELP_120400_TEXT="Nezapomeňte před budoucí aktualizací verze 'Attachments' vytvořit kopie souboru ikony a upraveného 'file_types.php' do nějakého adresáře mimo adresáře webu."
ATTACH_HELP_120500_TEXT="<strong>POZNÁMKA:</strong>. Pokud chcete zachovat vlastní ikony typů souborů při aktualizaci rozšíření Attachments, můžete je zkopírovat do oblasti přepisů obrázků šablony ('templates/TEMPLATE/images/com_attachments/file_types', kde 'TEMPLATE' nahraďte názvem složky vaší šablony). To lze použít pro zachování nových nebo upravených ikon nebo jejich nahrazení vámi preferovanými verzemi."
ATTACH_HELP_130000_SECTION_TITLE="Administrativní nástroje"
ATTACH_HELP_130100_TEXT="V backendu je k dispozici několik nástrojů pro administrátory. Patří mezi ně:"
ATTACH_HELP_130200_TEXT="<strong>Zakázat odinstalaci MySQL tabulky Attachments:</strong> Obvykle se při odinstalaci rozšíření Attachments odstraní databázová tabulka obsahující informace o přílohách. Pokud si přejete tato data zachovat, spusťte tento příkaz. Po odinstalaci Attachments tabulka zůstane zachována."
ATTACH_HELP_130300_TEXT="<strong>Znovu nainstalovat výchozí pravidla aktiv nebo oprávnění Attachments:</strong> Při instalaci rozšíření Attachments instalátor přidá několik výchozích pravidel, aby vlastní oprávnění fungovala logicky a podobně jako standardní oprávnění. Pokud znovu nainstalujete nebo aktualizujete Joomla, tato pravidla mohou být ztracena. Lze je obnovit spuštěním tohoto příkazu."
ATTACH_HELP_130400_TEXT="<strong>Znovu vygenerovat systémové názvy souborů příloh:</strong> Tento příkaz je velmi užitečný při přesunu (migraci) příloh z jednoho počítače na jiný. Úplná cesta ke každé příloze je uložena v databázi jako "systémový název souboru". Při přesunu příloh může být tato cesta nesprávná. Tento příkaz znovu vygeneruje systémové názvy pro všechny přílohy."
ATTACH_HELP_130500_TEXT="Příkaz pro "Znovu vygenerovat systémové názvy" funguje při migraci z Windows na Linux servery. Funguje také opačně, ale s několika možnými problémy:"
ATTACH_HELP_130600_TEXT="Při kopírování souborů na Windows server je nutné ověřit, že adresář příloh (obvykle 'attachments') a všechny soubory v něm mají oprávnění pro zápis webovým serverem Joomla."
ATTACH_HELP_130700_TEXT="Můžete mít problémy s přenosem souborů obsahujících Unicode znaky v názvech, protože archivační software může mít s těmito znaky problémy (na straně Windows). Tyto soubory může být nutné uložit, odstranit odpovídající přílohy a znovu je připojit."
ATTACH_HELP_130800_TEXT="<strong>Odstranit mezery z názvů souborů:</strong> Tento příkaz nahradí všechny mezery v názvech souborů podtržítky. Na některých systémech to může být nutné. V režimu 'Secure' by to nemělo být potřeba."
ATTACH_HELP_130900_TEXT="<strong>Aktualizovat velikosti souborů příloh:</strong> Tento příkaz přepočítá velikosti všech příloh."
ATTACH_HELP_131000_TEXT="<strong>Zkontrolovat existenci souborů příloh:</strong> Tento příkaz ověří existenci souborů pro všechny přílohy. Chybějící soubory budou vypsány."
ATTACH_HELP_131100_TEXT="<strong>Ověřit URL:</strong> URL přílohy uchovávají informaci o své platnosti. Tento příkaz zkontroluje každou URL přílohu a aktualizuje její stav."
ATTACH_HELP_131200_NOTE="Někdy se při spuštění některého z těchto nástrojů může objevit varování, že prohlížeč musí znovu odeslat požadavek. To je neškodné, klikněte na [OK] a příkaz se provede."
ATTACH_HELP_140000_SECTION_TITLE="Varování a řešení problémů"
ATTACH_HELP_140100_TEXT="<strong>Pokud máte citlivé nebo soukromé soubory, použijte možnost *Zabezpečené stahování příloh*!</strong> Pokud tuto možnost nepoužijete, soubory jsou uloženy ve veřejném podadresáři a jsou přístupné každému, kdo zná jejich URL (i bez přihlášení). Možnost <em>secure</em> tomu zabrání. Viz výše pro více informací."
ATTACH_HELP_140200_TEXT="Při každém nahrání souboru se kontroluje existence podadresáře pro upload a pokud neexistuje, vytvoří se. Výchozí adresář je 'attachments' v kořenovém adresáři webu. Název lze změnit pomocí volby 'Sub-directory for uploads'. Pokud jej nelze vytvořit automaticky, musíte jej vytvořit ručně a nastavit správná oprávnění (např. 775 v Unix/Linux). Problém může být v oprávnění kořenového adresáře."
ATTACH_HELP_140300_TEXT="Pokud nelze nahrát některé typy souborů (např. zip), pamatujte, že rozšíření respektuje omezení Media Manageru. Administrátor může povolit další typy v 'Global Settings' → 'System' → 'Media Manager'."
ATTACH_HELP_140400_TEXT="Pokud nevidíte přílohy na frontendu, možné důvody:"
ATTACH_HELP_140500_TEXT="Příloha není publikována. Změňte ve správci Attachments."
ATTACH_HELP_140600_TEXT="Nadřazený článek nebo položka není publikována."
ATTACH_HELP_140700_TEXT="Úroveň přístupu přílohy není 'Public' a nejste přihlášeni, nebo nemáte oprávnění. Opravte změnou access levelu."
ATTACH_HELP_140800_TEXT="Plugin 'Content - Attachments' není zapnutý."
ATTACH_HELP_140900_TEXT="V pluginu není access level nastaven na 'Public'."
ATTACH_HELP_141000_TEXT="Pokud používáte cache, zkuste ji vymazat."
ATTACH_HELP_141100_TEXT="U vlastních šablon může být potřeba upravit šablonu pro zobrazení příloh kategorií."
ATTACH_HELP_141200_TEXT="Pokud narazíte na limit velikosti souboru, přidejte do .htaccess:"
ATTACH_HELP_141300_TEXT="hodnotu 32M můžete upravit dle potřeby."
ATTACH_HELP_141400_TEXT="Pokud používáte Windows Vista a máte problém s URL {LOCALHOST}, jde o konflikt IPv4/IPv6."
ATTACH_HELP_141500_TEXT="Zakomentujte řádek s {IPV6HOST1} v souboru {HOSTS}."
ATTACH_HELP_141600_TEXT="Problémy s Unicode názvy řešte zapnutím <em>Secure Attachments Downloads</em>."
ATTACH_HELP_141700_TEXT="Při přidávání příloh během vytváření článku existuje krátké období „limbo“, kdy jsou přílohy svázány pouze s user ID. Pokud více lidí používá stejný účet současně, může dojít k přiřazení k nesprávnému článku."
ATTACH_HELP_141800_TEXT="Existuje fórum 'Help' a fórum 'Frequently Asked Questions' pro rozšíření 'Attachments' 3, které je hostováno na webu joomlacode.org. Pokud narazíte na problém, který není pokryt v této nápovědě, obraťte se prosím na fóra. (Dotazy prosím pokládejte ve fóru 'Help'. Často kladené dotazy budu zveřejňovat ve fóru 'Frequently Asked Questions'):"
ATTACH_HELP_141900_TEXT="Fóra Attachments na {FORUMS}"
ATTACH_HELP_150000_SECTION_TITLE="Aktualizace"
ATTACH_HELP_150100_TEXT="Aktualizace je velmi snadná. Máte dvě možnosti:"
ATTACH_HELP_150200_TEXT="Jednoduše nainstalujte novou verzi 'Attachments'. Není potřeba odinstalovat předchozí verzi. Nemusíte dělat nic pro zachování stávajících příloh. Stačí nainstalovat novou verzi a vše se automaticky aktualizuje."
ATTACH_HELP_150300_TEXT="<strong>Doporučeno:</strong> Jednou z výborných funkcí v Joomla 2.5 a novějších je aktualizátor rozšíření. Přejděte do správce rozšíření v backendu a klikněte na záložku 'Update'. Klikněte na 'Purge Cache' a poté na 'Find Updates' v panelu nástrojů. Pokud je k dispozici nová verze Attachments, zobrazí se. Můžete ji vybrat a kliknout na tlačítko 'Update' pro instalaci nové verze. Díky tomu je udržování rozšíření Attachments velmi jednoduché!"
ATTACH_HELP_160000_SECTION_TITLE="Odinstalace"
ATTACH_HELP_160100_TEXT="Pokud si přejete zachovat přílohy, vytvořte kopii adresáře '{ATTACH_DIR}' v kořenovém adresáři instalace Joomla a zkopírujte tabulku '{ATTACH_TBL}' v databázi (je třeba zjistit prefix tabulek '#_' ve vašem systému). Pokud plánujete brzkou reinstalaci, viz příkaz <strong>'{DISABLE_SQL}'</strong> v sekci {SECT_UTILS}, který zabrání smazání databázové tabulky při odinstalaci."
ATTACH_HELP_160200_TEXT="Pokud si nepřejete zachovat existující přílohy, nejprve je všechny smažte (v administrátorském backendu). Po odinstalaci rozšíření Attachments smažte adresář 'attachments' v kořenovém adresáři Joomla."
ATTACH_HELP_160300_TEXT="Pro odinstalaci rozšíření Attachments přejděte na záložku 'Manage' ve správci rozšíření (v menu 'Extensions'). <strong>Vyberte POUZE položku</strong>:"
ATTACH_HELP_160400_TEXT="Package: Attachments for Joomla 2.5+"
ATTACH_HELP_160500_TEXT="a klikněte na tlačítko 'Uninstall' v panelu nástrojů. (Číslo verze Joomla se může lišit.) Tím se odinstaluje komponenta Attachments i všechny související pluginy."
ATTACH_HELP_170000_SECTION_TITLE="Migrace Attachments z Joomla 1.5 na Joomla 2.5+ nebo 3.x"
ATTACH_HELP_170100_TEXT="Pro migraci příloh z Joomla 1.5 na Joomla 2.5 (nebo 3.x) postupujte podle návodu v odkazech pro migraci:"
