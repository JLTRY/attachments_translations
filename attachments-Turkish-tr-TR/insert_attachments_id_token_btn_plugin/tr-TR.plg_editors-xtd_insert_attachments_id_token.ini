; English translation

; NOTE TO TRANSLATORS:
; Do not translate the '{attachments}' part of any of the right-hand
; strings below!  It must appear exactly as '{attachments}' in the
; article/parent text in order for the substitutions to work correctly in
; 'custom placement' mode.!

INSERT_ATTACHMENTS_ID_TOKEN="{attachments id=xxx} belirtecini ekle"
INSERT_ATTACHMENTS_ID_TOKEN_DESCRIPTION="İmleci (ön yüzde) ekler listesinin görünmesini istediğiniz yere götürüp, bu düğmeye tıklayın. İmlecin olduğu yere, 'Özel Yerleştirme' ayarı kullanılarak {attachments} belirteci eklenir. Ayrıca ek HTML kodu eklenerek, ekler listesi gösterilmiyorken belirtecin gizlenmesi sağlanabilir."
ATTACH_INSERT_ATTACHMENTS_ID_TOKEN_PLUGIN_ATTACHMENTS_FRAMEWORK_NOT_AVAILABLE="Insert Attachments Id Token uygulama eki, Attachments Framework eklentisinin yüklü ve etkin olmasını gerektirir."
